<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HC PlateScope HTML</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <style>
    :root {
      --ink: #1f2723;
      --muted: #66736d;
      --line: #dbe5df;
      --panel: #ffffff;
      --bg: #f6f8f6;
      --green: #2f5d50;
      --teal: #2f8f83;
      --blue: #315f9f;
      --amber: #a86421;
      --red: #a33b3b;
      --soft: #edf5f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .shell { display: grid; grid-template-columns: 270px minmax(0, 1fr); min-height: 100vh; }
    aside { border-right: 1px solid var(--line); background: #fbfcfb; padding: 22px 18px; }
    main { padding: 24px; max-width: 1120px; width: 100%; }
    .brand { font-size: 20px; font-weight: 800; color: var(--green); margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 18px; }
    .nav { display: grid; gap: 8px; }
    .nav button {
      width: 100%; min-height: 42px; text-align: left; border: 1px solid var(--line);
      background: #fff; color: var(--ink); border-radius: 8px; padding: 0 12px; font-weight: 720;
    }
    .nav button.active { border-color: var(--green); background: var(--soft); color: var(--green); }
    .status {
      margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; padding: 12px;
      background: #fff; color: var(--muted); font-size: 13px; line-height: 1.5;
    }
    .status strong { color: var(--green); }
    .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1 { margin: 0 0 6px; color: var(--green); font-size: 30px; line-height: 1.1; }
    h2 { margin: 0 0 12px; font-size: 17px; color: var(--green); }
    .lede { margin: 0; color: var(--muted); line-height: 1.55; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .panel { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 16px; }
    .span { grid-column: 1 / -1; }
    label { display: block; color: var(--muted); font-size: 13px; font-weight: 680; margin-bottom: 6px; }
    input[type="text"], input[type="number"], select {
      width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 7px;
      background: #fff; color: var(--ink); padding: 0 10px; font: inherit;
    }
    input[type="file"] {
      width: 100%; border: 1px dashed #b8c9c0; border-radius: 8px; padding: 12px; background: #fbfdfb;
    }
    .row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .check { display: flex; align-items: center; gap: 8px; margin-top: 28px; color: var(--ink); font-weight: 650; }
    .check input { width: 18px; height: 18px; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .primary, .secondary {
      min-height: 42px; border-radius: 8px; padding: 0 16px; font-weight: 780; cursor: pointer;
      border: 1px solid var(--green);
    }
    .primary { background: var(--green); color: white; }
    .secondary { background: #fff; color: var(--green); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .notice { border-left: 4px solid var(--teal); background: #f1faf7; padding: 12px; border-radius: 8px; color: var(--muted); }
    .error { border-left-color: var(--red); background: #fff4f4; color: #6f2929; }
    .result { display: none; margin-top: 14px; }
    .files { display: grid; gap: 7px; margin: 10px 0 0; padding: 0; list-style: none; }
    .files li { border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; color: var(--muted); background: #fff; font-size: 13px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; white-space: nowrap; }
    th { color: var(--green); background: #f3f8f5; }
    .table-wrap { max-width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      main { padding: 18px; }
      .grid, .row { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">HC PlateScope</div>
      <div class="sub">Browser HTML runner · Python core unchanged</div>
      <div class="nav" id="moduleNav"></div>
      <div class="status" id="kernelStatus"><strong>Kernel</strong><br>等待初始化</div>
    </aside>
    <main>
      <div class="top">
        <div>
          <h1 id="moduleTitle">HC PlateScope</h1>
          <p class="lede" id="moduleDesc">选择模块并上传数据文件。</p>
        </div>
        <button class="secondary" id="initBtn" type="button">Initialize Python</button>
      </div>

      <form id="runForm" class="grid">
        <section class="panel span">
          <h2>Run settings</h2>
          <div class="row">
            <div>
              <label for="runName">Project name</label>
              <input id="runName" type="text" placeholder="Optional">
            </div>
            <div>
              <label for="plateFormat">Plate format</label>
              <select id="plateFormat">
                <option value="auto">Auto-detect</option>
                <option value="96">96-well</option>
                <option value="384">384-well</option>
              </select>
            </div>
            <label class="check">
              <input id="autoStandardize" type="checkbox" checked>
              Auto-standardize uploads
            </label>
          </div>
        </section>

        <section class="panel span">
          <h2>Input files</h2>
          <div id="fileFields" class="grid"></div>
        </section>

        <section class="panel span" id="moduleOptions"></section>

        <section class="panel span">
          <h2>Run</h2>
          <div class="notice" id="runNotice">首次运行前需要初始化 Python。初始化会从 CDN 加载 Pyodide 和科学计算包。</div>
          <div class="actions">
            <button class="primary" id="runBtn" type="submit" disabled>Run analysis</button>
            <button class="secondary" id="downloadBtn" type="button" disabled>Download outputs.zip</button>
          </div>
        </section>
      </form>

      <section class="panel result" id="resultPanel">
        <h2>Results</h2>
        <div id="summary"></div>
        <ul class="files" id="fileList"></ul>
      </section>

      <section class="panel result" id="previewPanel">
        <h2>Preview</h2>
        <div class="table-wrap" id="preview"></div>
      </section>
    </main>
  </div>

    const BASE = "/home/pyodide/hc_platescope";
    const MODULES = {

    const $ = (id) => document.getElementById(id);

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function setStatus(text) {
      $("kernelStatus").innerHTML = "<strong>Kernel</strong><br>" + text;
    }

    function setNotice(text, isError = false) {
      const notice = $("runNotice");
      notice.textContent = text;
      notice.classList.toggle("error", isError);
    }

    function renderNav() {
      const nav = $("moduleNav");
      nav.innerHTML = "";
      for (const [key, meta] of Object.entries(MODULES)) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = meta.title;
        btn.className = key === activeModule ? "active" : "";
        btn.addEventListener("click", () => {
          activeModule = key;
          latestZip = null;
          $("downloadBtn").disabled = true;
          render();
        });
        nav.appendChild(btn);
      }
    }

    function renderFiles(meta) {
      const wrap = $("fileFields");
      wrap.innerHTML = "";
      const files = [...meta.files];
      if (activeModule === "geco" && $("plateFormat").value === "384") {
        files.splice(0, files.length, ["input", "Upload 384-well paired GECO table"]);
      }
      for (const [key, label] of files) {
        const box = document.createElement("div");
        box.className = "panel";
        box.innerHTML = `<label for="file_${key}">${label}</label><input id="file_${key}" data-file-key="${key}" type="file" accept=".xlsx,.xls,.csv">`;

      const section = $("moduleOptions");

        section.innerHTML = `
          <h2>Peak windows</h2>
          <div class="row">
            <div><label for="peak450Low">450 low</label><input id="peak450Low" type="number" value="430"></div>

            <div><label for="peak520High">520 high</label><input id="peak520High" type="number" value="540"></div>
          </div>`;

        section.innerHTML = `
          <h2>GECO mode</h2>
          <div class="notice">For 384-well mode, odd columns are treated as without CA and adjacent even columns as with CA.</div>`;
      } else {
        section.classList.add("hidden");
      }
    }

    function render() {
      const meta = MODULES[activeModule];
      renderNav();
      $("moduleTitle").textContent = meta.title;
      $("moduleDesc").textContent = meta.desc;
      $("autoStandardize").disabled = activeModule === "wellid";
      $("autoStandardize").checked = activeModule === "wellid" ? false : $("autoStandardize").checked;
      renderFiles(meta);
      renderOptions();
      $("resultPanel").style.display = "none";
      $("previewPanel").style.display = "none";

    async function initPython() {
      if (pyodide) return;
      $("initBtn").disabled = true;
      setStatus("加载 Pyodide...");
      pyodide = await loadPyodide();
      setStatus("加载 Python 包...");
      await pyodide.loadPackage(["numpy", "pandas", "matplotlib", "scipy", "openpyxl", "pyyaml", "micropip"]);
      try {
        await pyodide.runPythonAsync("import micropip\nawait micropip.install('xlrd')");
      } catch (err) {
        console.warn("xlrd install failed", err);
      }
      setStatus("写入 HC PlateScope 模块...");
      pyodide.FS.mkdirTree(`${BASE}/plate_processor`);
      pyodide.FS.mkdirTree(`${BASE}/browser_inputs`);
      pyodide.FS.mkdirTree(`${BASE}/outputs`);
      for (const [path, data] of Object.entries(PY_FILES)) {
        pyodide.FS.writeFile(`${BASE}/${path}`, b64ToBytes(data));
      }
      pyodide.FS.writeFile(`${BASE}/config.yaml`, b64ToBytes(CONFIG_YAML));
      await pyodide.runPythonAsync(`
import os, sys, matplotlib
matplotlib.use("Agg")
os.chdir("${BASE}")
if "${BASE}" not in sys.path:
    sys.path.insert(0, "${BASE}")
`);
      setStatus("已就绪");
      setNotice("Python 已初始化，可以运行分析。");
      $("runBtn").disabled = false;
    }

    function safeName(name) {
      return name.replace(/[^A-Za-z0-9._-]+/g, "_").slice(0, 120) || "upload.dat";
    }

    async function collectFiles() {
      const out = {};
      for (const input of document.querySelectorAll("input[type=file][data-file-key]")) {
        if (!input.files.length) throw new Error(`Missing file: ${input.previousElementSibling.textContent}`);
        const file = input.files[0];
        const path = `${BASE}/browser_inputs/${Date.now()}_${safeName(file.name)}`;
        pyodide.FS.writeFile(path, new Uint8Array(await file.arrayBuffer()));
        out[input.dataset.fileKey] = { path, name: file.name };
      }
      return out;
    }

    function requestPayload(files) {
      const payload = {
        module: activeModule,
        run_name: $("runName").value.trim(),
        plate_format: $("plateFormat").value,
        auto_standardize: $("autoStandardize").checked,
        files,
      };
      if (activeModule === "luci") {
        payload.peak450 = [Number($("peak450Low").value), Number($("peak450High").value)];
        payload.peak520 = [Number($("peak520Low").value), Number($("peak520High").value)];
      }
      return payload;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }

    function renderResult(result) {
      $("summary").innerHTML = `
        <div class="notice">
          Run complete: <strong>${escapeHtml(result.run_id)}</strong><br>
          Module: ${escapeHtml(result.module_type)} · Plate: ${escapeHtml(result.plate_format)} · Warnings: ${result.warnings.length}
        </div>`;
      const list = $("fileList");
      list.innerHTML = "";
      for (const file of result.files) {
        const li = document.createElement("li");
        li.textContent = file;
        list.appendChild(li);
      }
      $("resultPanel").style.display = "block";

      if (result.preview && result.preview.columns.length) {
        const head = `<tr>${result.preview.columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
        const rows = result.preview.rows.map((row) => `<tr>${result.preview.columns.map((c) => `<td>${escapeHtml(row[c])}</td>`).join("")}</tr>`).join("");
        $("preview").innerHTML = `<table>${head}${rows}</table>`;
        $("previewPanel").style.display = "block";
      }
    }

    async function runAnalysis(event) {

      try {
        if (!pyodide) await initPython();
        $("runBtn").disabled = true;
        $("downloadBtn").disabled = true;
        setNotice("正在运行分析...");
        const files = await collectFiles();
        const payload = requestPayload(files);
        pyodide.globals.set("RUN_REQUEST_JSON", JSON.stringify(payload));
        const raw = await pyodide.runPythonAsync(`
import json, zipfile, traceback
from pathlib import Path
import pandas as pd
from plate_processor.io import standardize_by_well
from plate_processor.report import run_wellid, run_geco, run_geco_384_paired, run_luci, run_lss
from plate_processor.anti_analysis import run_anti_analysis
from plate_processor.utils import load_config

req = json.loads(RUN_REQUEST_JSON)
cfg = load_config("config.yaml")
cfg["run_name"] = req.get("run_name", "")
plate_format = req.get("plate_format", "auto")
cfg.setdefault("plate", {})["format"] = "auto" if plate_format == "auto" else int(plate_format)
if req.get("module") == "geco" and plate_format == "384":
    cfg.setdefault("plotting", {}).setdefault("spectra_grid", {})["mode"] = "compact"
if req.get("module") == "luci":
    cfg.setdefault("peaks", {})["luci_450_window"] = req.get("peak450", [430, 470])
    cfg.setdefault("peaks", {})["luci_520_window"] = req.get("peak520", [500, 540])

def maybe_standardize(file_info):
    if not req.get("auto_standardize"):
        return file_info["path"], file_info["name"]
    in_path = Path(file_info["path"])
    df, _ = standardize_by_well(in_path, cfg, filename=file_info["name"])
    out_path = Path("browser_inputs") / f"{in_path.stem}_standardized.xlsx"
    df.to_excel(out_path, index=False)
    return str(out_path), out_path.name

files = req["files"]
module = req["module"]
if module == "wellid":
    info = files["input"]
    result = run_wellid(info["path"], info["name"], cfg)
elif module == "geco":
    if str(cfg.get("plate", {}).get("format")) == "384":
        path, name = maybe_standardize(files["input"])
        result = run_geco_384_paired(path, name, cfg)
    else:
        with_path, with_name = maybe_standardize(files["with_ca"])
        without_path, without_name = maybe_standardize(files["without_ca"])
        result = run_geco(with_path, without_path, with_name, without_name, cfg)
elif module == "luci":
    path, name = maybe_standardize(files["input"])
    result = run_luci(path, name, cfg)
elif module == "lss":
    emission_path, emission_name = maybe_standardize(files["emission"])
    excitation_path, excitation_name = maybe_standardize(files["excitation"])
    result = run_lss(emission_path, excitation_path, emission_name, excitation_name, cfg)
elif module == "anti":
    emission_path, emission_name = maybe_standardize(files["emission"])
    excitation_path, excitation_name = maybe_standardize(files["excitation"])
    result = run_anti_analysis(excitation_path, emission_path, excitation_name, emission_name, cfg)
else:
    raise ValueError(f"Unknown module: {module}")

metadata = result.get("metadata", {})
run_dir = Path(result["run_dir"])
zip_name = f"{metadata.get('run_id', run_dir.name)}_outputs.zip"
zip_path = Path(zip_name)
with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
    for item in run_dir.rglob("*"):
        if item.is_file():
            zf.write(item, arcname=str(Path(run_dir.name) / item.relative_to(run_dir)))

preview_df = None
for key in ["summary", "standardized", "normalized", "excitation_normalized"]:
    value = result.get(key)
    if isinstance(value, pd.DataFrame):
        preview_df = value
        break
preview = {"columns": [], "rows": []}
if preview_df is not None:

json.dumps({

    "plate_format": metadata.get("plate_format", ""),
    "warnings": metadata.get("warnings", []),

    "zip_name": zip_name,
    "preview": preview,
}, ensure_ascii=False)
`);

    $("downloadBtn").addEventListener("click", () => {

      const a = document.createElement("a");
      a.href = url;
      a.download = latestZip.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
    $("plateFormat").addEventListener("change", render);
    render();
  </script>
</body>
</html>

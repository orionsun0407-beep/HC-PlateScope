<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HC PlateScope HTML</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <style>
    :root {
      --ink: #20332d;
      --muted: #62746d;
      --line: #d7e8df;
      --panel: #ffffff;
      --bg: #f4faf7;
      --green: #245b4d;
      --teal: #2b9a8a;
      --blue: #315f9f;
      --amber: #a86421;
      --red: #a33b3b;
      --soft: #eaf7f1;
      --warm: #fff7ed;
      --purple: #7566a8;
      --mist: #f8fcfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 0 10%, rgba(43,154,138,.14), transparent 28rem),
        linear-gradient(180deg, #f8fcfa 0%, var(--bg) 52%, #f7fbf8 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .shell { display: grid; grid-template-columns: 270px minmax(0, 1fr); min-height: 100vh; }
    aside { border-right: 1px solid var(--line); background: rgba(251,253,251,.92); padding: 22px 18px; backdrop-filter: blur(12px); }
    main { padding: 24px; max-width: 1280px; width: 100%; }
    .brand { font-size: 20px; font-weight: 800; color: var(--green); margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 18px; }
    .nav { display: grid; gap: 8px; }
    .nav button {
      width: 100%; min-height: 42px; text-align: left; border: 1px solid var(--line);
      background: rgba(255,255,255,.82); color: var(--ink); border-radius: 8px; padding: 0 12px; font-weight: 720;
    }
    .nav button.active { border-color: var(--green); background: var(--soft); color: var(--green); }
    .side-link {
      width: 100%; min-height: 38px; text-align: left; border: 0; background: transparent;
      color: var(--muted); padding: 0 8px; font-weight: 720; cursor: pointer;
    }
    .side-link.active { color: var(--green); }
    .status {
      margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; padding: 12px;
      background: #fff; color: var(--muted); font-size: 13px; line-height: 1.5;
    }
    .status strong { color: var(--green); }
    .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1 { margin: 0 0 6px; color: var(--green); font-size: 30px; line-height: 1.1; }
    h2 { margin: 0 0 12px; font-size: 17px; color: var(--green); }
    .lede { margin: 0; color: var(--muted); line-height: 1.55; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .hero {
      display: grid; grid-template-columns: minmax(0, 1.2fr) 360px; gap: 24px; align-items: stretch;
      margin-bottom: 22px;
    }
    .hero-copy {
      border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(180deg, #ffffff, #f8fcfa);
      padding: 24px; box-shadow: 0 12px 32px rgba(47, 93, 80, 0.06);
    }
    .eyebrow { color: var(--teal); font-weight: 820; font-size: 13px; margin-bottom: 8px; }
    .hero h1 { font-size: 44px; margin-bottom: 10px; }
    .hero-copy p { color: var(--muted); line-height: 1.6; margin: 0 0 10px; max-width: 760px; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .tag {
      border: 1px solid #d8ebe5; background: #eef7f4; color: var(--green);
      border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 760;
    }
    .plate-wrap {
      border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(180deg, #fff, #fbfefc); padding: 18px;
      box-shadow: 0 12px 32px rgba(47, 93, 80, 0.06);
    }
    .plate-title { color: var(--green); font-weight: 820; margin-bottom: 12px; }
    .plate-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; }
    .well { aspect-ratio: 1; border-radius: 50%; border: 1px solid #c8d9d0; background: #eef7f4; }
    .well.blue { background: #e9f1fb; border-color: #b9cde6; }
    .well.warm { background: var(--warm); border-color: #efd6b6; }
    .cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .feature-card {
      border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.92); padding: 16px;
      min-height: 210px; display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 8px 24px rgba(47, 93, 80, 0.055);
    }
    .feature-line { height: 4px; width: 56px; border-radius: 999px; background: var(--teal); }
    .feature-card.blue .feature-line { background: var(--blue); }
    .feature-card.orange .feature-line { background: var(--amber); }
    .feature-card.purple .feature-line { background: var(--purple); }
    .feature-card h3 { margin: 0; color: var(--green); font-size: 18px; }
    .feature-card p { margin: 0; color: var(--muted); line-height: 1.5; flex: 1; }
    .feature-card button { width: 100%; }
    .breadcrumb { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .mode-pill {
      border: 1px solid #d8ebe5; background: #eef7f4; color: var(--green); border-radius: 8px;
      padding: 10px 12px; min-width: 210px;
    }
    .mode-pill span { display: block; color: var(--muted); font-size: 12px; font-weight: 720; margin-bottom: 4px; }
    .mode-pill strong { font-size: 14px; }
    .step-title { color: var(--teal); font-weight: 820; font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
    .panel { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 16px; }
    .span { grid-column: 1 / -1; }
    label { display: block; color: var(--muted); font-size: 13px; font-weight: 680; margin-bottom: 6px; }
    input[type="text"], input[type="number"], select {
      width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 7px;
      background: #fff; color: var(--ink); padding: 0 10px; font: inherit;
    }
    input[type="file"] {
      width: 100%; border: 1px dashed #b8c9c0; border-radius: 8px; padding: 12px; background: #fbfdfb;
    }
    .row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .row.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .row.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .check { display: flex; align-items: center; gap: 8px; margin-top: 28px; color: var(--ink); font-weight: 650; }
    .check.inline { margin-top: 0; min-height: 40px; }
    .check input { width: 18px; height: 18px; }
    input[type="range"] { width: 100%; accent-color: var(--green); }
    input[type="color"] {
      width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 7px;
      background: #fff; padding: 4px;
    }
    .field-note { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 6px; }
    .section-title { margin: 18px 0 10px; color: var(--green); font-size: 15px; font-weight: 820; }
    details.advanced { border: 1px solid var(--line); border-radius: 8px; background: #fbfdfb; padding: 12px; margin-top: 14px; }
    details.advanced summary { cursor: pointer; color: var(--green); font-weight: 820; }
    .compact-controls.hidden { display: none; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .primary, .secondary {
      min-height: 42px; border-radius: 8px; padding: 0 16px; font-weight: 780; cursor: pointer;
      border: 1px solid var(--green);
    }
    .primary { background: var(--green); color: white; }
    .secondary { background: #fff; color: var(--green); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .notice { border-left: 4px solid var(--teal); background: #f1faf7; padding: 12px; border-radius: 8px; color: var(--muted); }
    .error { border-left-color: var(--red); background: #fff4f4; color: #6f2929; }
    .result { display: none; margin-top: 14px; }
    .files { display: grid; gap: 7px; margin: 10px 0 0; padding: 0; list-style: none; }
    .files li { border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; color: var(--muted); background: #fff; font-size: 13px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; white-space: nowrap; }
    th { color: var(--green); background: #f3f8f5; }
    .table-wrap { max-width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      main { padding: 18px; }
      .grid, .row, .hero, .cards { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
      .hero h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">HC PlateScope</div>
      <div class="sub">Mac 分享包 · 在线版<br>核心 Python 分析保持不变</div>
      <button class="side-link active" id="dashboardBtn" type="button">仪表盘</button>
      <div class="nav" id="moduleNav"></div>
      <div class="status" id="kernelStatus"><strong>计算内核</strong><br>等待初始化</div>
    </aside>
    <main>
      <section id="dashboardView"></section>

      <section id="workspaceView" class="hidden">
        <div class="top">
          <div>
            <div class="breadcrumb">仪表盘 / <span id="crumbTitle">工作区</span></div>
            <h1 id="moduleTitle">HC PlateScope</h1>
            <p class="lede" id="moduleDesc">选择模块并上传数据文件。</p>
            <div class="tags" id="moduleTags"></div>
          </div>
          <div class="mode-pill"><span>数据模式</span><strong id="moduleMode">本地浏览器分析</strong></div>
        </div>
        <div class="actions" style="margin: -6px 0 16px;">
          <button class="secondary" id="backBtn" type="button">返回仪表盘</button>
          <button class="secondary" id="initBtn" type="button">初始化 Python</button>
        </div>

      <form id="runForm" class="grid">
        <section class="panel span">
          <div class="step-title">步骤 1</div>
          <h2>上传文件</h2>
          <p class="lede" id="uploadHelp"></p>
          <div id="fileFields" class="grid"></div>
          <div id="uploadInfo"></div>
        </section>

        <section class="panel span">
          <div class="step-title">步骤 2</div>
          <h2>运行设置</h2>
          <div class="row">
            <div>
              <label for="runName">本次项目名称</label>
              <input id="runName" type="text" placeholder="可选">
            </div>
            <div>
              <label for="plateFormat">孔板格式</label>
              <select id="plateFormat">
                <option value="auto">自动识别</option>
                <option value="96">96 孔板</option>
                <option value="384">384 孔板</option>
              </select>
            </div>
            <label class="check">
              <input id="autoStandardize" type="checkbox" checked>
              自动标准化上传文件
            </label>
          </div>
          <div class="row" id="spectraLayoutControls" style="margin-top: 12px;">
            <div>
              <label for="spectraMode">散点图排列方式</label>
              <select id="spectraMode">
                <option value="plate">孔板布局</option>
                <option value="compact">紧凑布局</option>
              </select>
            </div>
            <div class="compact-controls">
              <label for="spectraColumns">每行图数</label>
              <input id="spectraColumns" type="number" min="4" max="24" step="1" value="12">
            </div>
            <div class="compact-controls">
              <label for="spectraRowsPerPage">每页 PDF 行数</label>
              <input id="spectraRowsPerPage" type="number" min="2" max="16" step="1" value="8">
            </div>
          </div>
          <div class="notice" style="margin-top: 12px;">内置 Well ID Extractor 可在 GECO、LUCI、LSS、ANTI 分析前，将原始读板仪导出文件转换为标准 well-by-column 表。</div>
        </section>

        <section class="panel span" id="moduleOptions"></section>

        <section class="panel span">
          <div class="step-title">步骤 3</div>
          <h2>运行</h2>
          <div class="notice" id="runNotice">首次运行前需要初始化 Python。初始化会从 CDN 加载 Pyodide 和科学计算包。</div>
          <div class="actions">
            <button class="primary" id="runBtn" type="submit" disabled>运行分析</button>
            <button class="secondary" id="downloadBtn" type="button" disabled>下载 outputs.zip</button>
          </div>
        </section>
      </form>

      <section class="panel result" id="resultPanel">
        <div class="step-title">步骤 4</div>
        <h2>结果</h2>
        <div id="summary"></div>
        <ul class="files" id="fileList"></ul>
      </section>

      <section class="panel result" id="previewPanel">
        <h2>结果预览</h2>
        <div class="table-wrap" id="preview"></div>
      </section>
      </section>
    </main>
  </div>

    const $ = (id) => document.getElementById(id);

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function setStatus(text) {
      $("kernelStatus").innerHTML = "<strong>计算内核</strong><br>" + text;
    }

    function setNotice(text, isError = false) {
      const notice = $("runNotice");
      notice.textContent = text;
      notice.classList.toggle("error", isError);
    }

    function tagHtml(tags) {
      return tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
    }

    function plateDecoration() {
      const h = new Set(["1,1","2,1","3,1","4,1","5,1","6,1","1,4","2,4","3,4","4,4","5,4","6,4","3,2","3,3","4,2","4,3"]);
      const c = new Set(["1,7","1,8","1,9","1,10","2,6","3,6","4,6","5,6","6,7","6,8","6,9","6,10"]);
      let out = "";
      for (let row = 0; row < 8; row += 1) {
        for (let col = 0; col < 12; col += 1) {
          const key = `${row},${col}`;
          const cls = h.has(key) || c.has(key) ? "blue" : ((row + col) % 5 === 0 ? "warm" : "");
          out += `<span class="well ${cls}"></span>`;
        }
      }
      return out;
    }

    function openDashboard() {
      currentView = "dashboard";
      $("dashboardView").classList.remove("hidden");
      $("workspaceView").classList.add("hidden");
      $("dashboardBtn").classList.add("active");
      renderNav();
    }

    function openModule(key) {
      activeModule = key;
      currentView = "module";
      latestZip = null;
      $("downloadBtn").disabled = true;
      $("dashboardView").classList.add("hidden");
      $("workspaceView").classList.remove("hidden");
      $("dashboardBtn").classList.remove("active");
      render();
    }

      setStatus("写入 HC PlateScope 分析模块...");
      pyodide.FS.mkdirTree(`${BASE}/plate_processor`);
      pyodide.FS.mkdirTree(`${BASE}/browser_inputs`);
      pyodide.FS.mkdirTree(`${BASE}/outputs`);
      for (const [path, data] of Object.entries(PY_FILES)) {
        pyodide.FS.writeFile(`${BASE}/${path}`, b64ToBytes(data));
      }
      pyodide.FS.writeFile(`${BASE}/config.yaml`, b64ToBytes(CONFIG_YAML));
      await pyodide.runPythonAsync(`
import os, sys, matplotlib
matplotlib.use("Agg")
os.chdir("${BASE}")
if "${BASE}" not in sys.path:
    sys.path.insert(0, "${BASE}")
`);
      setStatus("已就绪");

    function safeName(name) {
      return name.replace(/[^A-Za-z0-9._-]+/g, "_").slice(0, 120) || "upload.dat";
    }

    async function collectFiles() {
      const out = {};
      for (const input of document.querySelectorAll("input[type=file][data-file-key]")) {
        if (!input.files.length) throw new Error(`缺少文件：${input.previousElementSibling.textContent}`);
        const file = input.files[0];
        const path = `${BASE}/browser_inputs/${Date.now()}_${safeName(file.name)}`;
        pyodide.FS.writeFile(path, new Uint8Array(await file.arrayBuffer()));
        out[input.dataset.fileKey] = { path, name: file.name };
      }
      return out;
    }

    function requestPayload(files) {
      const payload = {
        module: activeModule,
        run_name: $("runName").value.trim(),
        plate_format: $("plateFormat").value,
        auto_standardize: $("autoStandardize").checked,
        files,
        spectra_layout: activeModule === "wellid" ? null : {
          mode: $("spectraMode").value,
          columns: Number($("spectraColumns").value),
          rows_per_page: Number($("spectraRowsPerPage").value),
        },
      };
      if (activeModule !== "wellid") {
        payload.plot = {
          smoothing_enabled: $("smoothEnabled").checked,
          marker_size: Number($("markerSize").value),
          line_width: Number($("lineWidth").value),
          per_well_y_axis: $("perWellYAxis").checked,
          y_upper_padding: Number($("yUpperPadding").value),
          show_heatmap_values: $("showHeatmapValues") ? $("showHeatmapValues").checked : false,
          robust_heatmap: $("robustHeatmap") ? $("robustHeatmap").checked : false,
          smoothing_method: $("smoothMethod").value,
          window_length: Number($("windowLength").value),
          polyorder: Number($("polyorder").value),
          marker_alpha: Number($("markerAlpha").value),
          line_alpha: Number($("lineAlpha").value),
          nice_rounding: $("niceRounding").checked,
          primary_color: $("primaryColor").value,
          secondary_color: $("secondaryColor").value,
          badge_color: $("badgeColor").value,
          heatmap_color: $("heatmapColor") ? $("heatmapColor").value : "hc_nature",
          robust_low: $("robustLow") ? Number($("robustLow").value) : 5,
          robust_high: $("robustHigh") ? Number($("robustHigh").value) : 95,
        };
      }
      if (activeModule === "luci") {
        payload.peak450 = [Number($("peak450Low").value), Number($("peak450High").value)];
        payload.peak520 = [Number($("peak520Low").value), Number($("peak520High").value)];
      }
      return payload;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }

      if (result.preview && result.preview.columns.length) {

        const rows = result.preview.rows.map((row) => `<tr>${result.preview.columns.map((c) => `<td>${escapeHtml(row[c])}</td>`).join("")}</tr>`).join("");

    preview = {"columns": [str(c) for c in small.columns], "rows": small.astype(str).to_dict(orient="records")}

json.dumps({
    "run_id": metadata.get("run_id", ""),
    "module_type": metadata.get("module_type", module),
    "plate_format": metadata.get("plate_format", ""),
    "warnings": metadata.get("warnings", []),
    "files": [str(Path(f).relative_to(run_dir)) if str(f).startswith(str(run_dir)) else str(f) for f in result.get("output_files", [])],
    "zip_path": str(zip_path),
    "zip_name": zip_name,
    "preview": preview,
}, ensure_ascii=False)
`);
        const result = JSON.parse(raw);
        const zipBytes = pyodide.FS.readFile(result.zip_path);
        latestZip = { name: result.zip_name, blob: new Blob([zipBytes], { type: "application/zip" }) };
        $("downloadBtn").disabled = false;
        renderResult(result);
        setNotice("分析完成，可以下载 outputs.zip。");
      } catch (err) {
        console.error(err);
        setNotice(err.message || String(err), true);
      } finally {
        $("runBtn").disabled = !pyodide;
      }
    }

    $("dashboardBtn").addEventListener("click", openDashboard);
    $("backBtn").addEventListener("click", openDashboard);
    $("initBtn").addEventListener("click", () => initPython().catch((err) => {
      console.error(err);
      setStatus("初始化失败");
      setNotice(err.message || String(err), true);
      $("initBtn").disabled = false;
    }));
    $("runForm").addEventListener("submit", runAnalysis);
    $("downloadBtn").addEventListener("click", () => {
      if (!latestZip) return;
      const url = URL.createObjectURL(latestZip.blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = latestZip.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
    $("plateFormat").addEventListener("change", render);
    $("spectraMode").addEventListener("change", renderPlateControls);
    renderDashboard();
    openDashboard();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HC PlateScope</title>
  <link rel="stylesheet" href="styles.css?v=2026-07-08-native">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="hc-side-title">HC PlateScope</div>
    <div class="hc-side-note">Local-first workspace<br>Runs stay in this browser<br>Version 2.0.0</div>
    <hr>
    <label class="side-check"><input id="debugMode" type="checkbox"> Debug mode</label>
    <p class="side-caption" id="currentWorkspace">Current workspace: Dashboard</p>
    <p class="side-caption" id="latestRun">Latest run: none</p>
  </aside>

  <main class="main">
    <section id="dashboard"></section>
    <section id="workspace" class="hidden"></section>
  </main>

  <div id="scratch" aria-hidden="true"></div>
  <script src="native-app.js?v=2026-07-08-native"></script>
</body>
</html>
